services:
  - type: web
    name: echo-server
    env: node
    region: oregon
    plan: starter
    buildCommand: cd server && npm install
    startCommand: cd server && npx tsx src/index.ts
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: PORT
        value: "4000"
      # TURN relay for P2P WebRTC voice (required on Render — no UDP host networking)
      - key: TURN_URLS
        value: ""
      - key: TURN_USERNAME
        value: ""
      - key: TURN_CREDENTIAL
        value: ""
